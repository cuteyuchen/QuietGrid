trading:
  # v2 默认使用 1 倍有效杠杆；提高风险只能在下一窗口并经验证后生效。
  leverage: 1
  capital_per_symbol: 200
  total_capital_limit: 1000
  take_profit_usdt: 10
  stop_buffer_pct: 0.015
  max_concurrent: 1
  max_maker_fee_rate: 0.0002
  maker_fee_check_interval_seconds: 300

features:
  regime_v2: true
  inventory_manager: true
  adaptive_grid_v2: true
  risk_manager_v2: true
  ai_regime_feature: false

timing:
  observe_hours: 3
  observe_kline_interval: "1m"
  live_observation: false
  testnet_force_window: true
  testnet_fast_observation: true
  observe_check_seconds: 60
  force_close_minutes: 120
  cooldown_re_observe_hours: 1
  min_calm_minutes: 15
  scheduler_check_minutes: 5
  loop_interval_seconds: 10

grid:
  range_method: "std"
  std_k: 1.8
  quantile_upper: 0.95
  quantile_lower: 0.05
  min_step_pct: 0.0015
  min_tradable_range_pct: 0.0015
  safety_multiplier: 3.5
  max_grid_num: 20
  min_grid_num: 6
  max_step_pct: 0.01
  max_range_pct: 0.03
  center_half_life_minutes: 30
  k_atr_range: 2.0
  k_sigma_range: 2.0
  k_atr_step: 0.50
  k_sigma_step: 0.80
  expansion_rate: 0.08
  volatility_refresh_seconds: 60
  rolling_regrid_enabled: true
  rolling_regrid_seconds: 7200

cooldown:
  atr_period: 14
  calm_window_minutes: 30
  atr_recovery_ratio: 0.80
  amplitude_multiplier: 2.0

regime:
  short_window: 15
  long_window: 60
  enter_threshold: 75
  stay_threshold: 65
  max_data_age_seconds: 90
  recovery_confirm_minutes: 15
  weights:
    volatility: 0.25
    trend: 0.25
    liquidity: 0.20
    mean_reversion: 0.15
    cost: 0.10
    event: 0.05
  hard_limits:
    max_spread_pct: 0.0010
    max_vol_expansion_ratio: 2.5
    min_depth_usdt: 10000

risk:
  effective_leverage_cap: 1.0
  max_session_loss_pct: 0.005
  max_weekend_loss_pct: 0.015
  max_symbol_inventory_pct: 0.10
  max_group_notional_pct: 0.20
  max_consecutive_session_losses: 2
  max_window_stop_count: 3
  exchange_stop_required: true
  block_risk_increase_hot_reload: true

inventory:
  caution_utilization: 0.40
  high_utilization: 0.60
  critical_utilization: 0.80
  suppress_same_side_orders: true
  passive_reduce_first: true

costs:
  verify_maker_fee_at_startup: true
  adverse_selection_buffer_pct: 0.0005
  slippage_buffer_pct: 0.0005
  safety_margin_pct: 0.0005

selection:
  scan_candidate_count: 10
  volume_weight: 0.7
  depth_weight: 0.3
  depth_levels: 5
  # Binance futures testnet does not expose TradFi token contracts.
  # BTC/ETH/BCH are for testnet connectivity only; remove them before any future real-market deployment.
  symbol_allowlist:
    - BTCUSDT
    - ETHUSDT
    - BCHUSDT
    - AAPLUSDT
    - MSFTUSDT
    - TSLAPREUSDT
    - TSLAUSDT
    - NVDAUSDT
    - METAUSDT
    - AMZNUSDT
    - GOOGLUSDT
  symbol_blacklist: []

proxy:
  enabled: true
  http: "http://127.0.0.1:7897"
  https: "http://127.0.0.1:7897"

web:
  port: 8080
  address: "0.0.0.0"
  auth_token: ""

# Vue 控制台的交易 loop 进程控制。mode=auto 在 Linux 下使用 systemd，在 Windows 下显示不可用。
# 非 systemd 环境可使用 mode=command，并配置 status_command / stop_command / restart_command 为字符串列表。
process_control:
  mode: "auto"
  service: "quietgrid-trader"
  # mode: "command"
  # status_command: ["powershell", "-NoProfile", "-Command", "Get-Service quietgrid-trader"]
  # stop_command: ["powershell", "-NoProfile", "-Command", "Stop-Service quietgrid-trader"]
  # restart_command: ["powershell", "-NoProfile", "-Command", "Restart-Service quietgrid-trader"]
  # timeout_seconds: 15

notifications:
  enabled: false
  webhook_url: ""
  telegram_chat_id: ""
  min_level: "WARN"
  timeout_seconds: 5
  format: "generic"

database:
  path: "data/trading.db"

backtest:
  # 控制台仅枚举此目录内的 CSV；API 会拒绝路径穿越。
  dataset_dir: "data"
  report_dir: "reports/backtests"
  fill_model: "L0_CONSERVATIVE"
  max_fills_per_bar: 2
  maker_fill_probability: 0.65
  fill_probability_seed: 17
  taker_fee_rate: 0.0005
  stop_slippage_bps: 10.0
  funding_rate_per_bar: 0.0
  walk_forward_test_rows: 12
  monte_carlo_simulations: 1000
  monte_carlo_seed: 17
  monte_carlo_missing_fill_probability: 0.10
  monte_carlo_loss_multiplier: 1.25
  monte_carlo_cost_per_event: 0.0

# 可选多账户配置。未配置 accounts 时继续使用 .env 中的 BINANCE_API_KEY / BINANCE_API_SECRET。
# default_account_id: main
# accounts:
#   - id: main
#     label: 主账户
#     testnet: false
#     api_key_env: BINANCE_MAIN_API_KEY
#     api_secret_env: BINANCE_MAIN_API_SECRET
#     database_path: data/trading-main.db
#   - id: hedge
#     label: 对冲账户
#     testnet: true
#     # 或使用独立环境变量：
#     # testnet_env: BINANCE_HEDGE_TESTNET
#     api_key_env: BINANCE_HEDGE_API_KEY
#     api_secret_env: BINANCE_HEDGE_API_SECRET
#     database_path: data/trading-hedge.db

logging:
  level: "INFO"
  file: "logs/trader.log"
  rotation: "100 MB"
  retention: "30 days"
