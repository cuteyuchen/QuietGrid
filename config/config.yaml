trading:
  # v2 默认使用 1 倍有效杠杆；提高风险只能在下一窗口并经验证后生效。
  leverage: 1
  capital_per_symbol: 500
  total_capital_limit: 2000
  direction_mode: "NEUTRAL"
  direction_overrides:
    BTCUSDT: "LONG"
    ETHUSDT: "SHORT"
    BCHUSDT: "NEUTRAL"
  take_profit_usdt: 10
  stop_buffer_pct: 0.015
  max_concurrent: 3
  max_maker_fee_rate: 0.0002
  maker_fee_check_interval_seconds: 300

entry:
  seed_execution: "MARKET"
  seed_max_slippage_pct: 0.002

features:
  regime_v2: true
  inventory_manager: true
  adaptive_grid_v2: true
  risk_manager_v2: true
  ai_regime_feature: false

timing:
  observe_hours: 3
  observe_kline_interval: "1m"
  live_observation: false
  startup_auto_entry: true
  startup_observation_mode: "historical_prefill"
  required_closed_bars: 180
  kline_fetch_buffer_bars: 2
  allowed_window_kinds:
    - "WEEKEND"
    - "HOLIDAY"
  testnet_force_window: true
  testnet_fast_observation: true
  observe_check_seconds: 60
  force_close_minutes: 120
  minimum_trade_minutes: 120
  cooldown_re_observe_hours: 1
  min_calm_minutes: 15
  scheduler_check_minutes: 5
  startup_scan_interval_seconds: 60
  loop_interval_seconds: 10

runtime:
  heartbeat_interval_seconds: 5
  heartbeat_stale_seconds: 20
  heartbeat_offline_seconds: 60
  startup_timeout_seconds: 15

entry:
  max_price_drift_pct: 0.002
  revalidate_before_place: true

grid:
  range_method: "std"
  std_k: 1.8
  quantile_upper: 0.95
  quantile_lower: 0.05
  min_step_pct: 0.0015
  range_multiplier_by_symbol: {}
  min_step_pct_by_symbol: {}
  min_tradable_range_pct: 0.0015
  safety_multiplier: 3.5
  max_grid_num: 20
  min_grid_num: 3
  max_step_pct: 0.01
  max_range_pct: 0.03
  center_half_life_minutes: 30
  k_atr_range: 2.0
  k_sigma_range: 2.0
  k_atr_step: 0.50
  k_sigma_step: 0.80
  expansion_rate: 0.08
  # 区间与格距共用同一波动率预测尺度（§9.2）。
  horizon_bars: 60
  volatility_estimator: "ewma"
  volatility_refresh_seconds: 60
  rolling_regrid_enabled: true
  rolling_regrid_seconds: 7200

cooldown:
  atr_period: 14
  calm_window_minutes: 30
  atr_recovery_ratio: 0.80
  amplitude_multiplier: 2.0

regime:
  short_window: 15
  long_window: 60
  enter_threshold: 75
  stay_threshold: 65
  soft_breach_limit: 3
  max_data_age_seconds: 90
  recovery_confirm_minutes: 15
  # event 权重默认 0：当前无事件 Provider，避免"无事件数据即加分"。
  # 接入事件源后再上调 event 并置 event_source_available: true（§9.1）。
  event_source_available: false
  weights:
    volatility: 0.25
    trend: 0.20
    liquidity: 0.25
    mean_reversion: 0.15
    cost: 0.15
    event: 0.00
  hard_limits:
    max_spread_pct: 0.0010
    max_vol_expansion_ratio: 2.5
    min_depth_usdt: 10000

risk:
  effective_leverage_cap: 1.0
  max_session_loss_pct: 0.005
  max_weekend_loss_pct: 0.015
  max_symbol_inventory_pct: 0.10
  max_group_notional_pct: 0.20
  max_consecutive_session_losses: 2
  max_window_stop_count: 3
  exchange_stop_required: true
  block_risk_increase_hot_reload: true

inventory:
  caution_utilization: 0.40
  high_utilization: 0.60
  critical_utilization: 0.80
  suppress_same_side_orders: true
  passive_reduce_first: true

costs:
  verify_maker_fee_at_startup: true
  adverse_selection_buffer_pct: 0.0005
  slippage_buffer_pct: 0.0005
  safety_margin_pct: 0.0005

selection:
  scan_candidate_count: 10
  volume_weight: 0.7
  depth_weight: 0.3
  depth_levels: 5
  # Binance futures testnet does not expose TradFi token contracts.
  # BTC/ETH/BCH are for testnet connectivity only; remove them before any future real-market deployment.
  symbol_allowlist:
    - BTCUSDT
    - ETHUSDT
    - BCHUSDT
    - AAPLUSDT
    - MSFTUSDT
    - TSLAPREUSDT
    - TSLAUSDT
    - NVDAUSDT
    - METAUSDT
    - AMZNUSDT
    - GOOGLUSDT
  symbol_blacklist: []

proxy:
  enabled: true
  http: "http://127.0.0.1:7897"
  https: "http://127.0.0.1:7897"

web:
  port: 8080
  # P0-2：默认仅监听本机；若改为非 loopback 地址，必须提供 auth_token 或
  # auth_token_env 指向的环境变量，否则服务拒绝启动（见 core.config.validate_web_binding）。
  address: "127.0.0.1"
  auth_token: ""
  auth_token_env: "QUIETGRID_WEB_TOKEN"

# Vue 控制台的交易 loop 进程控制。
# mode=auto：Windows 使用 local 本地启动；Linux 使用 systemd。
# mode=local：网页可直接启动 trader.py。
# mode=command：自定义 status/start/stop/restart 命令。
process_control:
  mode: "local"
  service: "quietgrid-trader"
  python_executable: ".venv/Scripts/python.exe"
  trader_entry: "trader.py"
  trader_args:
    - "--binance-loop"
  working_directory: "."
  pid_directory: "data/runtime"
  log_directory: "logs"
  timeout_seconds: 15
  # mode: "command"
  # status_command: ["powershell", "-NoProfile", "-Command", "Get-Service quietgrid-trader"]
  # stop_command: ["powershell", "-NoProfile", "-Command", "Stop-Service quietgrid-trader"]
  # restart_command: ["powershell", "-NoProfile", "-Command", "Restart-Service quietgrid-trader"]

notifications:
  enabled: false
  webhook_url: ""
  telegram_chat_id: ""
  min_level: "WARN"
  timeout_seconds: 5
  format: "generic"

database:
  path: "data/trading.db"

backtest:
  # 在线下载完成后写入不可变冻结数据集；旧 CSV 仍可放入该目录兼容使用。
  dataset_dir: "data/backtests/datasets"
  legacy_dataset_dir: "data"
  staging_dir: "data/backtests/staging"
  report_dir: "reports/backtests"
  storage_format: "csv"
  # 数据集格式版本由代码唯一掌管（data_sources.dataset_service.SCHEMA_VERSION），
  # 不在配置中重复声明，避免 §5.6 的双重来源隐患。
  # 归档优先的混合数据源：官方月/日归档为主，REST 仅补未归档的最新尾部。
  default_provider: "binance_hybrid"
  providers:
    binance_archive:
      enabled: true
      base_url: "https://data.binance.vision"
      market_path: "futures/um"
      prefer_monthly: true
      verify_official_checksum: true
      max_zip_bytes: 536870912
      max_uncompressed_bytes: 2147483648
    binance_rest:
      enabled: true
      base_url: "https://fapi.binance.com"
      use_for_latest_tail_only: true
      tail_max_days: 2
    binance_hybrid:
      enabled: true
      archive_provider: "binance_archive"
      rest_provider: "binance_rest"
      tolerate_missing_latest_tail: true
  online_data:
    enabled: true
    max_range_days_1m: 180
    max_concurrent_jobs: 1
    page_limit: 1500
    page_pause_seconds: 0.05
    request_timeout_seconds: 15
    retry_attempts: 3
    retry_backoff_seconds: 0.5
  validation:
    warning_missing_ratio: 0.001
    reject_missing_ratio: 0.01
    max_consecutive_missing: 5
    drop_unclosed: true
    verify_checksum_on_read: true
  windowing:
    default_mode: "NYSE_CLOSED_ONLY"
    force_close_minutes: 120
    minimum_tradable_rows: 30
  fill_model: "L0_CONSERVATIVE"
  max_fills_per_bar: 2
  maker_fill_probability: 0.65
  fill_probability_seed: 17
  taker_fee_rate: 0.0005
  stop_slippage_bps: 10.0
  seed_slippage_bps: 10.0
  retention_score_threshold: 65.0
  retention_soft_breach_limit: 3
  funding_rate_per_bar: 0.0
  walk_forward_test_rows: 12
  monte_carlo_simulations: 1000
  monte_carlo_seed: 17
  monte_carlo_missing_fill_probability: 0.10
  monte_carlo_loss_multiplier: 1.25
  monte_carlo_cost_per_event: 0.0

# 可选多账户配置。未配置 accounts 时继续使用 .env 中的 BINANCE_API_KEY / BINANCE_API_SECRET。
# default_account_id: main
# accounts:
#   - id: main
#     label: 主账户
#     testnet: false
#     api_key_env: BINANCE_MAIN_API_KEY
#     api_secret_env: BINANCE_MAIN_API_SECRET
#     database_path: data/trading-main.db
#   - id: hedge
#     label: 对冲账户
#     testnet: true
#     # 或使用独立环境变量：
#     # testnet_env: BINANCE_HEDGE_TESTNET
#     api_key_env: BINANCE_HEDGE_API_KEY
#     api_secret_env: BINANCE_HEDGE_API_SECRET
#     database_path: data/trading-hedge.db

logging:
  level: "INFO"
  file: "logs/trader.log"
  rotation: "100 MB"
  retention: "30 days"
